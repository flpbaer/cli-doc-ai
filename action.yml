name: 'Auto Documentation'
description: 'Generates a CHANGELOG entry automatically using AI (OpenRouter) based on PR commits and diff.'
author: 'cli-doc-ai'

branding:
  icon: 'file-text'
  color: 'blue'

inputs:
  openrouter-api-key:
    description: 'OpenRouter API key (required)'
    required: true
  openrouter-model:
    description: 'OpenRouter model ID. Defaults to mistralai/mistral-7b-instruct:free (free tier)'
    required: false
    default: 'mistralai/mistral-7b-instruct:free'
  changelog-path:
    description: 'Path to the CHANGELOG file relative to the caller repository root'
    required: false
    default: 'CHANGELOG.md'

outputs:
  changelog-updated:
    description: 'Whether the CHANGELOG was updated (true/false)'
    value: ${{ steps.run-script.outputs.changelog_updated }}
  entry-version:
    description: 'The version/tag used for the generated entry'
    value: ${{ steps.detect-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install and build action
      shell: bash
      working-directory: ${{ github.action_path }}
      run: bun install && bun run build

    - name: Collect PR metadata
      id: pr_meta
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        COMMITS=$(git log --pretty=format:"%h %s" "$BASE_SHA".."$HEAD_SHA" 2>/dev/null || \
                  git log --pretty=format:"%h %s" "origin/main..HEAD" 2>/dev/null || echo "(no commits found)")
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        DIFF_STAT=$(git diff --stat "$BASE_SHA".."$HEAD_SHA" 2>/dev/null || \
                    git diff --stat "origin/main..HEAD" 2>/dev/null || echo "(no diff stat)")
        echo "diff_stat<<EOF" >> $GITHUB_OUTPUT
        echo "$DIFF_STAT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        DIFF_CONTENT=$(git diff "$BASE_SHA".."$HEAD_SHA" -- \
          '*.ts' '*.tsx' '*.js' '*.jsx' '*.py' '*.go' '*.java' '*.cs' '*.rb' \
          '*.json' '*.yaml' '*.yml' '*.toml' '*.md' \
          2>/dev/null | head -c 12000 || \
          git diff "origin/main..HEAD" -- \
          '*.ts' '*.tsx' '*.js' '*.jsx' '*.py' '*.go' '*.java' '*.cs' '*.rb' \
          '*.json' '*.yaml' '*.yml' '*.toml' '*.md' \
          2>/dev/null | head -c 12000 || echo "")
        echo "diff_content<<EOF" >> $GITHUB_OUTPUT
        echo "$DIFF_CONTENT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Detect version
      id: detect-version
      shell: bash
      run: |
        VERSION=""

        if [ -f "package.json" ]; then
          VERSION=$(bun -e "console.log(require('./package.json').version)" 2>/dev/null || echo "")
        fi

        if [ -z "$VERSION" ] && [ -f "pyproject.toml" ]; then
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/' || echo "")
        fi

        if [ -z "$VERSION" ] && [ -f "Cargo.toml" ]; then
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/' || echo "")
        fi

        if [ -z "$VERSION" ]; then
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "PR-${{ github.event.pull_request.number }}")
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Generate documentation with AI
      id: run-script
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        OPENROUTER_MODEL: ${{ inputs.openrouter-model }}
        CHANGELOG_PATH: ${{ inputs.changelog-path }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        VERSION: ${{ steps.detect-version.outputs.version }}
        REPO_NAME: ${{ github.repository }}
        COMMITS: ${{ steps.pr_meta.outputs.commits }}
        DIFF_STAT: ${{ steps.pr_meta.outputs.diff_stat }}
        DIFF_CONTENT: ${{ steps.pr_meta.outputs.diff_content }}
        CALLER_WORKSPACE: ${{ github.workspace }}
      run: bun ${{ github.action_path }}/dist/action.js
